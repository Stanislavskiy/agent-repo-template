name: Distill Principles

on:
  push:
    paths:
      - 'docs/**'

jobs:
  distill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run distillation agent
        # Invoke your AI agent using .agents/prompts/distillation_prompt.md
        # Point it at the changed files under docs/ and the current distilled files
        # under .agents/context/principles/distilled/.
        # Replace this step with your preferred agent runner / API call.
        run: |
          echo "TODO: invoke distillation agent"
          echo "  Prompt : .agents/prompts/distillation-prompt.md"
          echo "  Sources: docs/**"
          echo "  Output : .agents/context/principles/distilled/"

      - name: Commit updated distilled principles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .agents/context/principles/distilled/
          git diff --staged --quiet || git commit -m "chore(principles): regenerate distilled principles [skip ci]"
          git push
